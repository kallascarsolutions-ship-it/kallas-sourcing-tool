name: KCS Daily Sourcing Scan

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run sourcing scan
        run: python main.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_screenshots/
          retention-days: 3

      - name: Commit CSV report to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name "KCS Sourcing Bot"
          git add reports/
          git diff --staged --quiet || git commit -m "Sourcing report $(date +%Y-%m-%d)"
          git push
